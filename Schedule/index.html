<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Java Developer Roadmap</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <h1>Java Developer Roadmap</h1>

        <div class="controls">
            <input type="text" id="search" placeholder="Search topic...">
            <button id="themeToggle">🌙</button>
        </div>

        <div class="progressContainer">
            <div id="progressBar"></div>
        </div>

        <p id="progressText">0% Completed</p>

    </header>


    <div class="container" id="roadmap">

        <section class="card">
            <h2>Learn the Basics</h2>

            <label><input type="checkbox" data-topic="syntax"> Basic Syntax</label>
            <label><input type="checkbox" data-topic="datatypes"> Data Types</label>
            <label><input type="checkbox" data-topic="variables"> Variables & Scope</label>
            <label><input type="checkbox" data-topic="casting"> Type Casting</label>
            <label><input type="checkbox" data-topic="arrays"> Arrays</label>
            <label><input type="checkbox" data-topic="loops"> Loops</label>
            <label><input type="checkbox" data-topic="conditionals"> Conditionals</label>
            <label><input type="checkbox" data-topic="strings"> Strings & Methods</label>
            <label><input type="checkbox" data-topic="math"> Math Operations</label>

        </section>


        <section class="card">
            <h2>Object Oriented Programming</h2>

            <label><input type="checkbox" data-topic="class"> Classes & Objects</label>
            <label><input type="checkbox" data-topic="attributes"> Attributes & Methods</label>
            <label><input type="checkbox" data-topic="access"> Access Specifiers</label>
            <label><input type="checkbox" data-topic="static"> Static Keyword</label>
            <label><input type="checkbox" data-topic="final"> Final Keyword</label>
            <label><input type="checkbox" data-topic="inheritance"> Inheritance</label>
            <label><input type="checkbox" data-topic="encapsulation"> Encapsulation</label>
            <label><input type="checkbox" data-topic="interfaces"> Interfaces</label>

        </section>


        <section class="card">
            <h2>Collections</h2>

            <label><input type="checkbox" data-topic="arraylist"> Array vs ArrayList</label>
            <label><input type="checkbox" data-topic="set"> Set</label>
            <label><input type="checkbox" data-topic="map"> Map</label>
            <label><input type="checkbox" data-topic="queue"> Queue</label>
            <label><input type="checkbox" data-topic="stack"> Stack</label>
            <label><input type="checkbox" data-topic="iterator"> Iterator</label>

        </section>


        <section class="card">
            <h2>Web Frameworks</h2>

            <label><input type="checkbox" data-topic="springboot"> Spring Boot</label>
            <label><input type="checkbox" data-topic="quarkus"> Quarkus</label>
            <label><input type="checkbox" data-topic="play"> Play Framework</label>
            <label><input type="checkbox" data-topic="javalin"> Javalin</label>

        </section>


        <section class="card">
            <h2>Database</h2>

            <label><input type="checkbox" data-topic="jdbc"> JDBC</label>
            <label><input type="checkbox" data-topic="hibernate"> Hibernate</label>
            <label><input type="checkbox" data-topic="jpa"> Spring Data JPA</label>

        </section>


        <section class="card">
            <h2>Testing</h2>

            <label><input type="checkbox" data-topic="junit"> JUnit</label>
            <label><input type="checkbox" data-topic="testng"> TestNG</label>
            <label><input type="checkbox" data-topic="mockito"> Mockito</label>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
